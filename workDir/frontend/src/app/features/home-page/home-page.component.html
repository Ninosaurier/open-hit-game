<div class="text-center text-3xl m-8">
  <h1>Open Hit Game</h1>
</div>
<div class="text-center m-8">
  <h2>
    The game where you can guess songs from video games! Put your knowledge to the test against your
    friends and become the top nerd in five different categories! Have fun &#x1F601;!
  </h2>
</div>

<div class="flex flex-col sm:flex-row flex-wrap justify-center items-center gap-2 w-full">
  <div class="flex justify-center w-full">
    <input
      type="text"
      placeholder="Your player name"
      [formControl]="playerName"
      class="input input-bordered w-2/3 sm:w-64 bg-white text-black placeholder:text-black mb-2"
    />
  </div>

  <button
    id="create-lobby"
    [disabled]="playerName.invalid"
    (click)="createLobby()"
    class="btn btn-primary btn-md w-2/3 sm:w-64"
  >
    Create room
  </button>

  <div class="flex justify-center w-full">
    <button (click)="showRules()" class="btn btn-outline bg-green-500 btn-md w-2/3 sm:w-64 mt-2">Change Rules</button>
  </div>
</div>
